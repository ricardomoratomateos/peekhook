services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: peekhook-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/peekhook
      INGEST_URL: http://localhost:3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ""
    container_name: peekhook-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"
