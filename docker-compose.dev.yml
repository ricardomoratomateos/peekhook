services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    container_name: peekhook-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/peekhook
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    container_name: peekhook-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://api:3000
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/index.html:/app/apps/web/index.html
      - ./apps/web/vite.config.js:/app/apps/web/vite.config.js
