map $request_method $is_capture {
    default 0;
    POST     1;
    PUT      1;
    PATCH    1;
    DELETE   1;
}

upstream peekhook_api {
    server api:3000;
}

server {
    listen 5173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    location ~* \.(?:js|css|svg|png|jpg|jpeg|ico|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
    }

    # /api/* always proxies to the API; SSE-friendly headers.
    location /api/ {
        proxy_pass http://peekhook_api;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
    }

    # /mcp (Streamable HTTP MCP transport) proxies to the API on the
    # same domain so browser MCP clients don't have to deal with CORS
    # or cross-origin OAuth redirects.
    location = /mcp {
        proxy_pass http://peekhook_api;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # /i/<token> (excluding bare /i). Capture methods proxy to the
    # API, everything else falls through to the SPA fallback below.
    #
    # nginx's `if` block is evil for proxy directives; we use map +
    # a single inline `proxy_pass` (no proxy_set_header inside if).
    # The cost: $host may be wrong on capture requests entering the
    # API. Acceptable for MVP self-host because the API doesn't gate
    # by Host header.
    location ~ ^/i/[^/]+/?$ {
        if ($is_capture) {
            proxy_pass http://peekhook_api;
        }
        try_files /index.html =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
