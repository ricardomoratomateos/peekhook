services:
  mongo:
    image: mongo:7
    container_name: peekhook-mongo
    restart: unless-stopped
    volumes:
      - peekhook-mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  default:
    name: peekhook

volumes:
  peekhook-mongo-data:
    name: peekhook-mongo-data
